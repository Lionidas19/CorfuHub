name: corfu_shared
description: Shared data, domain, and core utilities for CorfuHub — Supabase data sources, repositories, entities, error logging, and environment helpers.
version: 0.1.0
publish_to: "none"
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
