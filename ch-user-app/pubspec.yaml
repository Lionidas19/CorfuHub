name: corfu_hub_app
description: CorfuHub App (Resident) — civic and issues map, reporting, personalization and user-facing features for the Corfu Map Platform.
publish_to: "none"
version: 0.1.0
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  corfu_shared:
    path: ../shared
  provider: ^6.1.2
  go_router: ^14.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  supabase_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
